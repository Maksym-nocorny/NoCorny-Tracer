<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service | NoCorny Tracer</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <main class="container">
        <nav class="navbar glass-panel">
            <div class="logo">NoCorny Tracer</div>
            <div class="nav-links">
                <a href="/NoCorny-Tracer/">Home</a>
                <a href="/NoCorny-Tracer/#contact">Contact</a>
                <a href="/NoCorny-Tracer/privacy-policy">Privacy Policy</a>
                <a href="/NoCorny-Tracer/terms-of-service" class="active">Terms of Service</a>
            </div>
        </nav>

        <section class="content-section glass-panel fade-in-up">
            <div id="markdown-content">Loading...</div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 NoCorny Tracer. All rights reserved.</p>
            <p class="disclaimer">This application uses the Dropbox API but is not endorsed or certified by Dropbox, Inc.</p>
        </footer>
    </main>

    <script>
        fetch('../TERMS_OF_SERVICE.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('markdown-content').innerHTML = marked.parse(text);
            })
            .catch(() => {
                document.getElementById('markdown-content').innerHTML = '<p>Error loading content.</p>';
            });
    </script>
</body>
</html>
